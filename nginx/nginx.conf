# nginx reverse proxy for the combined GeoNova stack.
#
# Single public port (8080). Both the FastAPI backend and the Next.js frontend
# are hidden behind this proxy — neither is published to the host directly.
#
# IMPORTANT: the frontend ships pages at /embeddings and /downstream — the same
# path names the backend uses for its API routes (/embeddings, /downstream, plus
# /chat/*). Routing by path alone would shadow the FE pages and the backend would
# answer browser GETs with 405. So the backend is namespaced under /api/ instead:
#
#   /api/embeddings/...   → backend /embeddings/...   (prefix stripped)
#   /api/downstream/...   → backend /downstream/...
#   /api/chat/...         → backend /chat/...
#   /docs, /redoc,
#   /openapi.json         → backend, served at the root so the Swagger UI's
#                           root-relative /openapi.json fetch resolves correctly
#   everything else       → Next.js frontend (incl. the /embeddings, /downstream
#                           *pages*, which live on the same origin as the proxy)
#
# The frontend therefore uses NEXT_PUBLIC_BACKEND_URL=http://localhost:8080/api
# (same origin + /api prefix). It concatenates that base with the route path, so
# a request to http://localhost:8080/api/embeddings is routed to the backend.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream backend {
        server geonova:8000;
    }

    upstream frontend {
        server geonova-frontend:3000;
    }

    server {
        listen 8080;
        server_name _;

        # GeoNova can stream larger payloads (e.g. ENMAP tile uploads).
        client_max_body_size 50m;

        # ── Backend API (FastAPI), namespaced under /api/ ───────────────────
        # The trailing slash on proxy_pass strips the /api/ prefix, so
        # /api/embeddings/foo → backend /embeddings/foo (no backend rewrite
        # needed). GETs to the FE's /embeddings page never match this location.
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Embedding / inference / chat-stream calls can be long-lived.
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_buffering     off;   # streaming (SSE/chunked) passthrough
        }

        # ── FastAPI's own docs / schema, served at the root ─────────────────
        # Exact-match locations. /openapi.json is fetched root-relative by the
        # Swagger UI inside /docs, so it must resolve to the backend (the FE has
        # no /docs, /redoc or /openapi.json page).
        location = /docs {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /redoc {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /openapi.json {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Frontend (Next.js standalone) ───────────────────────────────────
        location / {
            # Drop bot/attacker probes for the Next.js react2shell CVE: POSTs
            # carrying a short "Next-Action" header. This app has *no* Server
            # Actions (its manifest registers zero), so any such request is
            # automated noise; legitimate action IDs are 40+ hex chars and won't
            # match. Blocking here keeps the malformed POSTs out of Next.js,
            # which otherwise logs "Failed to find Server Action" and burns CPU.
            # Safe use of `if`: a bare `return` is one of the few allowed forms.
            set $sa_probe "$request_method$http_next_action";
            if ($sa_probe ~ "^POST.{1,39}$") {
                return 400;
            }

            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HTTP/1.1 + Upgrade headers for any WebSocket-y routes (harmless
            # for the standalone prod server, needed if HMR is ever enabled).
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}